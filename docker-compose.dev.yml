services:
  db:
    image: postgres:16
    container_name: postgres_example
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: laravel
    ports:
      - "5432:5432"
      
  app:
    build: .
    container_name: laravel_app
    restart: always
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor          # ← CLAVE: volumen anónimo para vendor
      - /var/www/html/node_modules    # ← También para node_modules
    ports:
      - "8080:80"
    environment:
      # Configuración de desarrollo
      - APP_ENV=local
      - APP_DEBUG=true
      - LOG_CHANNEL=stderr
      
      # Conexión a PostgreSQL
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=laravel
      - DB_USERNAME=user
      - DB_PASSWORD=1234
    depends_on:
      - db